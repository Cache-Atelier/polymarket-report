name: Curate Headlines

on:
  schedule:
    # 10am ET (15:00 UTC) — morning edition
    - cron: '0 15 * * *'
    # 7pm ET (00:00 UTC next day) — evening edition
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate headlines
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL || 'claude-opus-4-20250115' }}
        run: node generate.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/headlines.json
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update headlines $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
