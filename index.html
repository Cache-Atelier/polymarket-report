<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLYMARKET REPORT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #FFFFFF;
      color: #000000;
      padding: 20px;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #main-story {
      text-align: center;
      margin: 30px auto 40px;
      max-width: 900px;
    }

    #main-story a {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      color: #CC0000;
      display: block;
      line-height: 1.3;
    }

    #logo {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 48px;
      font-weight: bold;
      margin: 50px 0;
      color: #000000;
      letter-spacing: 2px;
    }

    #columns-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-right: 1px solid #000000;
      padding-right: 30px;
    }

    .column:last-child {
      border-right: none;
    }

    .headline {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      text-decoration: underline;
      color: #000000;
      cursor: pointer;
      line-height: 1.4;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .headline:hover {
      opacity: 0.7;
    }

    .headline.red {
      color: #CC0000;
      font-weight: bold;
    }

    #error-message {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      color: #CC0000;
      margin: 50px 0;
    }

    #loading {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      margin: 50px 0;
    }

    @media (max-width: 768px) {
      #columns-container {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      #logo {
        font-size: 32px;
        margin: 30px 0;
      }

      #main-story a {
        font-size: 22px;
      }

      .headline {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">Loading markets...</div>
  <div id="main-story"></div>
  <h1 id="logo" style="display: none;">POLYMARKET REPORT</h1>
  <div id="columns-container">
    <div class="column" id="column-1"></div>
    <div class="column" id="column-2"></div>
    <div class="column" id="column-3"></div>
  </div>
  <div id="error-message"></div>

  <script>
    // ============================================
    // TUNABLE CONFIGURATION - Adjust these values
    // ============================================
    const TOTAL_MARKETS = 28;        // 1 main story + 27 in columns
    const MIN_VOLUME = 10000;        // $10k minimum volume filter
    const RED_THRESHOLD = 10;        // Markets with >10% movement show in red

    // ============================================
    // API FETCHING
    // ============================================
    async function fetchMarkets() {
      try {
        // Fetch from our Vercel serverless function (bypasses CORS)
        const response = await fetch('/api/markets');

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        console.log(`✓ Fetched ${data.length} events from Polymarket`);
        return data;
      } catch (error) {
        console.error('Failed to fetch markets:', error);
        showError('Error loading markets. Please refresh the page.');
        return [];
      }
    }

    // ============================================
    // RANKING ALGORITHM
    // ============================================
    function processEvents(events) {
      // Transform events into market objects we can rank
      // Events have nested "markets" array - we take the first active market
      const processed = [];

      for (const event of events) {
        if (!event.active || event.closed) continue;
        if (!event.markets || event.markets.length === 0) continue;

        // Find first active market in this event
        const activeMarket = event.markets.find(m => m.active && !m.closed);
        if (!activeMarket) continue;

        // Check for required data
        if (activeMarket.oneDayPriceChange === null || activeMarket.oneDayPriceChange === undefined) continue;
        if (!event.volume24hr) continue;

        // Create a combined object with data from both event and market
        processed.push({
          title: event.title,
          slug: event.slug,
          volume24hr: event.volume24hr,
          oneDayPriceChange: activeMarket.oneDayPriceChange,
          lastTradePrice: activeMarket.lastTradePrice || 0.5,
          question: activeMarket.question || event.title
        });
      }

      return processed;
    }

    function calculatePriceChange(market) {
      // oneDayPriceChange is in decimal format: -0.0115 = -1.15%
      const change = market.oneDayPriceChange;
      if (change === null || change === undefined) return 0;

      // Use absolute value - both big increases AND decreases are newsworthy
      return Math.abs(change * 100);
    }

    function rankMarkets(events) {
      // Process events into market objects
      const processed = processEvents(events);

      console.log(`✓ Processed ${processed.length} valid markets from ${events.length} events`);

      if (processed.length === 0) {
        console.error('No valid markets found!');
        return [];
      }

      // Filter by minimum volume (avoid low-liquidity noise)
      const filtered = processed.filter(m => m.volume24hr >= MIN_VOLUME);

      console.log(`✓ Filtered to ${filtered.length} markets with volume >= $${MIN_VOLUME.toLocaleString()}`);

      // Sort by absolute 24hr price change (pure "Breaking" algorithm)
      filtered.sort((a, b) => {
        const aChange = Math.abs(a.oneDayPriceChange);
        const bChange = Math.abs(b.oneDayPriceChange);
        return bChange - aChange;
      });

      // Attach price change percent for easy access
      const withPercent = filtered.map(market => ({
        ...market,
        priceChangePercent: calculatePriceChange(market)
      }));

      // Log top 10 for debugging
      console.log('Top 10 markets by 24hr movement:');
      withPercent.slice(0, 10).forEach((m, i) => {
        const displayTitle = m.title.substring(0, 60);
        console.log(`${i + 1}. ${displayTitle}... (Δ: ${m.priceChangePercent.toFixed(1)}%)`);
      });

      // Return top N markets
      return withPercent.slice(0, TOTAL_MARKETS);
    }

    // ============================================
    // DOM RENDERING
    // ============================================
    function formatHeadline(market) {
      // Calculate price change with arrow
      const rawChange = market.oneDayPriceChange * 100;
      const arrow = rawChange >= 0 ? '↑' : '↓';
      const changeText = `${arrow}${Math.abs(rawChange).toFixed(1)}%`;

      // Use title field (API uses "title" not "question" at top level)
      const headline = market.title || market.question || 'Unknown Market';

      // Format: "Market Question [↑12.5%]"
      return {
        text: `${headline} [${changeText}]`,
        url: `https://polymarket.com/event/${market.slug}`,
        market: market
      };
    }

    function renderMarkets(rankedMarkets) {
      if (rankedMarkets.length === 0) {
        showError('No markets available. Please try again later.');
        return;
      }

      // Hide loading message
      document.getElementById('loading').style.display = 'none';

      // Show logo
      document.getElementById('logo').style.display = 'block';

      // Render main story (index 0)
      const mainStory = formatHeadline(rankedMarkets[0]);
      const mainStoryEl = document.getElementById('main-story');
      const mainStoryLink = document.createElement('a');
      mainStoryLink.href = mainStory.url;
      mainStoryLink.target = '_blank';
      mainStoryLink.textContent = mainStory.text;
      mainStoryEl.appendChild(mainStoryLink);

      // Get column elements
      const columns = [
        document.getElementById('column-1'),
        document.getElementById('column-2'),
        document.getElementById('column-3')
      ];

      // Distribute remaining markets across 3 columns
      const remainingMarkets = rankedMarkets.slice(1);

      remainingMarkets.forEach((market, index) => {
        // Markets with movement > RED_THRESHOLD get red treatment
        const isRed = calculatePriceChange(market) > RED_THRESHOLD;
        const headline = formatHeadline(market);

        // Determine which column (round-robin distribution)
        const columnIndex = index % 3;

        // Create headline element
        const headlineLink = document.createElement('a');
        headlineLink.href = headline.url;
        headlineLink.target = '_blank';
        headlineLink.className = `headline ${isRed ? 'red' : ''}`;
        headlineLink.textContent = headline.text;

        // Append to appropriate column
        columns[columnIndex].appendChild(headlineLink);
      });

      console.log(`✓ Rendered ${rankedMarkets.length} markets to page`);
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-message').textContent = message;
    }

    // ============================================
    // APPLICATION INITIALIZATION
    // ============================================
    async function init() {
      console.log('🚀 Initializing Polymarket Report...');
      console.log(`Configuration: ${TOTAL_MARKETS} markets, $${MIN_VOLUME.toLocaleString()} min volume, ${RED_THRESHOLD}% red threshold`);

      const markets = await fetchMarkets();

      if (markets.length === 0) {
        return; // Error already displayed
      }

      const ranked = rankMarkets(markets);

      if (ranked.length < TOTAL_MARKETS) {
        console.warn(`⚠ Only found ${ranked.length} valid markets (requested ${TOTAL_MARKETS})`);
      }

      renderMarkets(ranked);

      console.log('✓ Polymarket Report loaded successfully');
    }

    // Run on page load
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
