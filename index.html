<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLYMARKET REPORT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #FFFFFF;
      color: #000000;
      padding: 10px;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #main-story {
      text-align: center;
      margin: 15px auto 20px;
      max-width: 900px;
    }

    #main-story a {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: bold;
      text-decoration: underline;
      color: #CC0000;
      display: block;
      line-height: 1.3;
    }

    #main-story .whale-tag {
      font-size: 11px;
      color: #CC0000;
      font-family: 'Courier New', monospace;
      margin-top: 4px;
    }

    #logo {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 48px;
      font-weight: 900;
      font-style: italic;
      margin: 25px 0;
      color: #000000;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    #columns-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 0;
      padding: 0 10px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 1px solid #000000;
      padding-right: 10px;
    }

    .column:last-child {
      border-right: none;
    }

    .headline {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      font-weight: bold;
      text-decoration: underline;
      color: #000000;
      cursor: pointer;
      line-height: 1.4;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .headline:hover {
      opacity: 0.7;
    }

    .headline.red {
      color: #CC0000;
      font-weight: bold;
    }

    .movement {
      font-size: 0.75em;
      color: #666666;
      font-weight: normal;
      text-decoration: none;
      white-space: nowrap;
    }

    .headline.red .movement {
      color: #CC0000;
      opacity: 0.6;
    }

    #main-story .movement {
      font-size: 0.6em;
      color: #CC0000;
    }

    .whale-tag {
      font-size: 10px;
      color: #CC0000;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .topic-divider {
      border: none;
      border-top: 1px solid #999;
      margin: 6px 0;
    }

    #error-message {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      color: #CC0000;
      margin: 50px 0;
    }

    #loading {
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      margin: 50px 0;
    }

    @media (max-width: 768px) {
      #columns-container {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      #logo {
        font-size: 32px;
        margin: 30px 0;
      }

      #main-story a {
        font-size: 22px;
      }

      .headline {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">Loading markets...</div>
  <div id="main-story"></div>
  <h1 id="logo" style="display: none;">POLYMARKET REPORT</h1>
  <div id="columns-container">
    <div class="column" id="column-1"></div>
    <div class="column" id="column-2"></div>
    <div class="column" id="column-3"></div>
  </div>
  <div id="error-message"></div>

  <script>
    const TOTAL_MARKETS = 28;

    async function fetchMarkets() {
      try {
        const response = await fetch('/api/markets');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        console.log(`Fetched ${data.markets?.length} markets (AI: ${data.meta?.aiProvider})`);
        return data.markets || [];
      } catch (error) {
        console.error('Failed to fetch markets:', error);
        showError('Error loading markets. Please refresh the page.');
        return [];
      }
    }

    function formatHeadline(market) {
      const text = market.headline || market.question;

      // Movement indicator — always shown unless change is negligible
      const rawChange = market.oneDayPriceChange * 100;
      let movement = null;
      if (Math.abs(rawChange) >= 0.1) {
        const arrow = rawChange >= 0 ? '\u2191' : '\u2193';
        movement = `${arrow}${Math.abs(rawChange).toFixed(1)}%`;
      }

      return {
        text,
        movement,
        url: market.eventSlug
          ? `https://polymarket.com/event/${market.eventSlug}`
          : `https://polymarket.com/market/${market.slug}`,
        isRed: market.isRed,
        whaleSignal: market.whaleSignal,
      };
    }

    function renderMarkets(markets) {
      if (markets.length === 0) {
        showError('No markets available. Please try again later.');
        return;
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('logo').style.display = 'block';

      // Main story (index 0) — always red, largest headline
      const mainStory = formatHeadline(markets[0]);
      const mainStoryEl = document.getElementById('main-story');
      const mainLink = document.createElement('a');
      mainLink.href = mainStory.url;
      mainLink.target = '_blank';
      mainLink.textContent = mainStory.text;
      mainStoryEl.appendChild(mainLink);

      if (mainStory.movement) {
        const mvSpan = document.createElement('span');
        mvSpan.className = 'movement';
        mvSpan.textContent = ' ' + mainStory.movement;
        mainLink.appendChild(mvSpan);
      }

      if (mainStory.whaleSignal) {
        const tag = document.createElement('div');
        tag.className = 'whale-tag';
        tag.textContent = 'WHALE ALERT';
        mainStoryEl.appendChild(tag);
      }

      // Build topic groups from consecutive same-topic headlines
      const remaining = markets.slice(1, TOTAL_MARKETS);
      const topicGroups = [];
      let currentGroup = null;

      for (const market of remaining) {
        const topic = market.topic || null;
        if (topic && currentGroup && currentGroup.topic === topic) {
          currentGroup.markets.push(market);
        } else {
          currentGroup = { topic, markets: [market] };
          topicGroups.push(currentGroup);
        }
      }

      // Distribute topic groups across columns, balancing by count
      const columnMarketCounts = [0, 0, 0];
      const columnGroups = [[], [], []];

      for (const group of topicGroups) {
        const minIdx = columnMarketCounts.indexOf(Math.min(...columnMarketCounts));
        columnGroups[minIdx].push(group);
        columnMarketCounts[minIdx] += group.markets.length;
      }

      // Render each column
      const columns = [
        document.getElementById('column-1'),
        document.getElementById('column-2'),
        document.getElementById('column-3'),
      ];

      columnGroups.forEach((groups, colIdx) => {
        groups.forEach((group, groupIdx) => {
          if (groupIdx > 0 && group.topic && groups[groupIdx - 1].topic) {
            const hr = document.createElement('hr');
            hr.className = 'topic-divider';
            columns[colIdx].appendChild(hr);
          }

          for (const market of group.markets) {
            const headline = formatHeadline(market);
            const container = document.createElement('div');

            const link = document.createElement('a');
            link.href = headline.url;
            link.target = '_blank';
            link.className = 'headline' + (headline.isRed ? ' red' : '');
            link.textContent = headline.text;
            if (headline.movement) {
              const mvSpan = document.createElement('span');
              mvSpan.className = 'movement';
              mvSpan.textContent = ' ' + headline.movement;
              link.appendChild(mvSpan);
            }
            container.appendChild(link);

            if (headline.whaleSignal) {
              const tag = document.createElement('div');
              tag.className = 'whale-tag';
              tag.textContent = 'WHALE ALERT';
              container.appendChild(tag);
            }

            columns[colIdx].appendChild(container);
          }
        });
      });

      console.log(`Rendered ${Math.min(markets.length, TOTAL_MARKETS)} markets`);
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-message').textContent = message;
    }

    async function init() {
      const markets = await fetchMarkets();
      if (markets.length === 0) return;
      renderMarkets(markets);
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
